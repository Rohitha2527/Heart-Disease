<!DOCTYPE html>
<html>
<head>
<title>Heart Disease Risk Checker</title>
</head>

<body>

<h2>Heart Disease Risk Checker</h2>

<form action="/calculate_risk" method="post">

<label>Age:</label>
<input type="number" name="age" required><br><br>

<label>Gender:</label>
<select name="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select><br><br>

<label>Cholesterol:</label>
<input type="number" name="cholesterol" required><br><br>

<label>Blood Pressure:</label>
<input type="number" name="blood_pressure" required><br><br>

<label>Maximum Heart Rate:</label>
<input type="number" name="heart_rate" required><br><br>

<button type="submit">Check Risk</button>

</form>

{% if prediction %}
<h3>Result: {{ prediction }}</h3>
{% endif %}

</body>
</html>
